<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding Numbers</title>
    <style>
        body {
            font: normal 18pt Arial;
        }
        input {
            font: normal 18pt Arial;
            width: 100px;
        }
        div#res {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Adding Values</h1>
    <input type="number" name="txtn1" id="txtn1" placeholder="Number 1">
    <input type="number" name="txtn2" id="txtn2" placeholder="Number 2">
    <input type="button" value="Add" onclick="addNumbers()">
    <div id="res">Result</div>

    <script>
        function addNumbers() {
            const tn1 = document.getElementById('txtn1');
            const tn2 = document.getElementById('txtn2');
            const res = document.getElementById('res');

            const n1 = Number(tn1.value);
            const n2 = Number(tn2.value);
            const sum = n1 + n2;

            res.innerHTML = `The sum of ${n1} and ${n2} is ${sum}.`;
        }
    </script>
</body>
</html>
